apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: custom-app
  namespace: custom-app
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: eks-demo
    alb.ingress.kubernetes.io/group.order: "20"
    # Argo Rollouts 管理此 annotation，控制 stable/canary 流量比例
    # 初始值：100% stable，0% canary
    alb.ingress.kubernetes.io/actions.custom-app: |
      {"type":"forward","forwardConfig":{"targetGroups":[
        {"serviceName":"custom-app","servicePort":"80","weight":100},
        {"serviceName":"custom-app-canary","servicePort":"80","weight":0}
      ]}}
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: custom-app      # 對應 actions.custom-app annotation
                port:
                  name: use-annotation
