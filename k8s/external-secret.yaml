apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: custom-app-secrets
  namespace: custom-app
spec:
  # ESO 每小時從 Secrets Manager 重新同步一次
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: custom-app-secrets    # 建立的 K8s Secret 名稱（與 deployment 一致）
    creationPolicy: Owner       # ESO 建立並管理此 Secret 的生命週期
  data:
    - secretKey: chat-api-key   # K8s Secret 裡的 key
      remoteRef:
        key: infra-lab-dev/custom-app   # Secrets Manager secret name
        property: chat-api-key          # JSON 欄位名稱
