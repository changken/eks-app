apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: custom-app
  namespace: custom-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: custom-app
  template:
    metadata:
      labels:
        app: custom-app
    spec:
      serviceAccountName: custom-app
      containers:
        - name: app
          # CI 自動更新此行：deploy.yml 會把 git SHA 寫入
          image: 661515655645.dkr.ecr.us-east-1.amazonaws.com/infra-lab-dev-app:4d0015b2ab2d6739c48ff5dbcf1e3cb40508b52d
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: KNOWLEDGE_BUCKET
              value: "infra-lab-dev-rag-661515655645"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CHAT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: custom-app-secrets
                  key: chat-api-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

  strategy:
    canary:
      # stable traffic 走 custom-app service，canary 走 custom-app-canary
      stableService: custom-app
      canaryService: custom-app-canary
      trafficRouting:
        alb:
          ingress: custom-app
          servicePort: 80
      steps:
        - setWeight: 20       # 20% 流量到 canary
        - analysis:
            templates:
              - templateName: success-rate
        - pause: {duration: 2m}
        - setWeight: 50       # 50% 流量到 canary
        - analysis:
            templates:
              - templateName: success-rate
        - pause: {duration: 2m}
        # 100% 自動完成（promote）
